<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Aberrante — Admin</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'studioaberrante/WEBABERRANTE',
          branch: 'main',
          auth_type: 'pkce',
          app_id: '0v23li4C51S2ZEGcu0DU'
        },
        media_folder: 'assets/servicios',
        public_folder: 'assets/servicios',
        collections: [
          {
            name: 'site',
            label: 'Sitio Web',
            files: [
              {
                label: 'Contenido del Sitio',
                name: 'content',
                file: 'content/site.json',
                format: 'json',
                fields: [
                  {
                    label: 'Hero',
                    name: 'hero',
                    widget: 'object',
                    fields: [
                      { label: 'Texto pequeño (eyebrow)', name: 'eyebrow', widget: 'string' }
                    ]
                  },
                  {
                    label: 'Servicios',
                    name: 'services',
                    widget: 'list',
                    allow_add: false,
                    allow_delete: false,
                    summary: '{{fields.num}} — {{fields.name}}',
                    fields: [
                      { label: 'Número', name: 'num', widget: 'string' },
                      { label: 'Nombre del servicio', name: 'name', widget: 'string' },
                      { label: 'Descripción', name: 'desc', widget: 'text' },
                      { label: 'Imagen', name: 'image', widget: 'image', media_folder: 'assets/servicios', public_folder: 'assets/servicios' }
                    ]
                  },
                  {
                    label: 'Marcas (marquee)',
                    name: 'brands',
                    widget: 'list',
                    field: { label: 'Marca', name: 'brand', widget: 'string' }
                  },
                  {
                    label: 'Texto Manifiesto',
                    name: 'manifesto',
                    widget: 'text',
                    hint: 'Usa salto de línea para separar las dos frases.'
                  }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
