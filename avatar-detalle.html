    function render() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const av = DB[id];

      if (!av) {
        window.location.href = 'avatares.html';
        return;
      }

      document.title = `${av.nombre} — Studio Aberrante`;

      document.getElementById('avdPhoto').src = av.img;
      document.getElementById('avdPhoto').alt = av.nombre;
      document.getElementById('avdType').textContent = av.tipo;
      document.getElementById('avdName').textContent = av.nombre;
      document.getElementById('avdBio').textContent = av.bio;

      const statsEl = document.getElementById('avdStats');
      av.stats.forEach(s => {
        const div = document.createElement('div');
        div.className = 'avd-stat';
        div.innerHTML = `<p class="avd-stat-label">${s.label}</p><p class="avd-stat-value">${s.value}</p>`;
        statsEl.appendChild(div);
      });

      const tagsEl = document.getElementById('avdTags');
      av.tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'avd-tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });

      // Gallery: 1 foto real + 3 placeholders
      const gridEl = document.getElementById('avdGalleryGrid');

      const mainItem = document.createElement('div');
      mainItem.className = 'avd-gallery-item';
      mainItem.innerHTML = `<img src="${av.img}" alt="${av.nombre}" loading="lazy">`;
      gridEl.appendChild(mainItem);

      for (let i = 0; i < 3; i++) {
        const ph = document.createElement('div');
        ph.className = 'avd-gallery-placeholder';
        ph.innerHTML = `<span class="avd-plus">+</span><span>Próximamente</span>`;
        gridEl.appendChild(ph);
      }
    }

    render();
